<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020202;
  --surface: #0c0c0c;
  --surface2: #111111;
  --border: rgba(255,255,255,0.05);
  --border-red: rgba(180,0,0,0.25);
  --text: #e8e0d8;
  --muted: #4a4540;
  --muted2: #6a6560;
  --accent: #c0000a;
  --accent-bright: #e8000d;
  --accent-dim: rgba(180,0,0,0.08);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cinzel', serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

/* ── starfield ── */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── layout ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── top bar ── */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 1.25rem 0.8rem;
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(to bottom, #020202 80%, transparent);
}

.topbar-left { display: flex; flex-direction: column; gap: 2px; }

.greeting {
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.username {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

.logo-mark {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mark svg {
  width: 20px; height: 20px;
  stroke: white; fill: none;
  stroke-width: 2; stroke-linecap: round;
}

/* ── section ── */
.section {
  padding: 0 1.25rem;
  margin-bottom: 1.25rem;
  animation: fadeUp 0.5s ease both;
}

.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.1s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.2s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-red);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.6;
}

/* ── bmi pill ── */
.bmi-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
}

.bmi-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted2);
}

.bmi-val span {
  color: var(--accent);
  font-weight: 500;
}

.bmi-badge {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  border: 1px solid var(--accent);
  color: var(--accent);
}

/* ── weight graph ── */
.chart-area {
  padding: 1rem 1rem 0.5rem;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.75rem;
}

.chart-current {
  font-family: 'DM Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
}

.chart-current span {
  font-size: 13px;
  color: var(--muted2);
  margin-left: 3px;
}

.chart-delta {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

.chart-delta.down { color: #22c55e; }
.chart-delta.up   { color: var(--accent); }

canvas#weightChart {
  width: 100%;
  height: 100px;
  display: block;
}

.chart-dates {
  display: flex;
  justify-content: space-between;
  padding: 0.3rem 0 0.75rem;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

/* ── calorie ring ── */
.calorie-wrap {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  padding: 1.25rem;
}

.ring-container {
  position: relative;
  width: 110px;
  height: 110px;
  flex-shrink: 0;
}

.ring-container svg {
  transform: rotate(-90deg);
  width: 110px;
  height: 110px;
}

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.ring-kcal {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.ring-label {
  font-size: 7px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-top: 3px;
}

.macros {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}

.macro-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.macro-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.macro-name {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
  width: 52px;
}

.macro-bar-wrap {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}

.macro-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
}

.macro-val {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
  width: 36px;
  text-align: right;
}

/* ── habits grid ── */
.habits-list {
  padding: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.habit-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 2px;
}

.habit-days {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.day-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
}

.day-dot.done {
  background: var(--accent);
  box-shadow: 0 0 4px rgba(180,0,0,0.5);
}

.habit-name {
  font-size: 12px;
  letter-spacing: 0.05em;
  color: var(--text);
  flex: 1;
}

.habit-icon {
  font-size: 14px;
  opacity: 0.7;
}

.no-data {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  padding: 1.5rem;
  letter-spacing: 0.05em;
}

/* ── bottom action bar ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  justify-content: center;
  padding: 0.75rem 1.25rem 1.25rem;
  background: linear-gradient(to top, #020202 60%, transparent);
}

.actions {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  max-width: 480px;
}

.action-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-red);
  border-radius: 4px;
  padding: 0.7rem 0.5rem;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.action-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.action-btn:hover { background: var(--surface2); border-color: rgba(180,0,0,0.5); }
.action-btn:hover::before { opacity: 1; }
.action-btn:active { transform: scale(0.97); }

.action-btn svg {
  width: 16px; height: 16px;
  stroke: var(--accent);
  fill: none; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
}

/* ── modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border-red);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  padding: 1.5rem 1.5rem 2.5rem;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  position: relative;
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.modal-handle {
  width: 36px; height: 3px;
  background: var(--muted);
  border-radius: 2px;
  margin: 0 auto 1.25rem;
}

.modal-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 1.25rem;
}

.modal-field {
  margin-bottom: 1rem;
}

.modal-field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 6px;
}

.modal-field input {
  width: 100%;
  background: #070707;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 2px;
  padding: 0.7rem 0.875rem;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.modal-field input:focus { border-color: var(--accent); }
.modal-field input::placeholder { color: #2a2520; }

.modal-submit {
  width: 100%;
  background: var(--accent);
  color: var(--text);
  border: none;
  border-radius: 2px;
  padding: 0.8rem;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background 0.2s;
}

.modal-submit:hover { background: var(--accent-bright); }

.modal-error {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #fca5a5;
  margin-top: 0.5rem;
  display: none;
}
.modal-error.show { display: block; }

/* ── loading skeleton ── */
.skeleton {
  background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 2px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="greeting">Welcome back</span>
      <span class="username" id="username">—</span>
    </div>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
  </div>

  <!-- weight section -->
  <div class="section">
    <div class="section-label">Weight</div>
    <div class="card" onclick="window.location.href='weight.html'" style="cursor:pointer">
      <div class="bmi-row">
        <span class="bmi-val">BMI <span id="bmi-val">—</span></span>
        <span class="bmi-badge" id="bmi-cat">—</span>
      </div>
      <div class="chart-area">
        <div class="chart-header">
          <div class="chart-current" id="weight-current">—<span>kg</span></div>
          <div class="chart-delta" id="weight-delta"></div>
        </div>
        <canvas id="weightChart"></canvas>
        <div class="chart-dates" id="chart-dates"></div>
      </div>
    </div>
  </div>

  <!-- calories section -->
  <div class="section">
    <div class="section-label">Today's Nutrition</div>
    <div class="card">
      <div class="calorie-wrap">
        <div class="ring-container">
          <svg viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="46" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
            <circle id="ring-progress" cx="55" cy="55" r="46" fill="none"
              stroke="#c0000a" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="289" stroke-dashoffset="289"
              style="transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-kcal" id="ring-kcal">0</div>
            <div class="ring-label">/ 2000</div>
          </div>
        </div>
        <div class="macros">
          <div class="macro-row">
            <div class="macro-dot" style="background:#e8000d"></div>
            <div class="macro-name">Protein</div>
            <div class="macro-bar-wrap"><div class="macro-bar" id="bar-protein" style="width:0%;background:#e8000d"></div></div>
            <div class="macro-val" id="val-protein">0g</div>
          </div>
          <div class="macro-row">
            <div class="macro-dot" style="background:#a0522d"></div>
            <div class="macro-name">Carbs</div>
            <div class="macro-bar-wrap"><div class="macro-bar" id="bar-carbs" style="width:0%;background:#a0522d"></div></div>
            <div class="macro-val" id="val-carbs">0g</div>
          </div>
          <div class="macro-row">
            <div class="macro-dot" style="background:#6b3a2a"></div>
            <div class="macro-name">Fats</div>
            <div class="macro-bar-wrap"><div class="macro-bar" id="bar-fats" style="width:0%;background:#6b3a2a"></div></div>
            <div class="macro-val" id="val-fats">0g</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- habits section -->
  <div class="section">
    <div class="section-label">Habits</div>
    <div class="card">
      <div class="habits-list" id="habits-list">
        <div class="no-data">Loading...</div>
      </div>
    </div>
  </div>

</div>

<!-- bottom action bar -->
<div class="bottom-bar">
  <div class="actions">
    <button class="action-btn" onclick="openModal('weight')">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Weight
    </button>
    <button class="action-btn" onclick="openModal('calorie')">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Calories
    </button>
    <button class="action-btn" onclick="openModal('habit')">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Habit
    </button>
  </div>
</div>

<!-- weight modal -->
<div class="modal-overlay" id="modal-weight" onclick="closeOnOverlay(event, 'weight')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Log Weight</div>
    <div class="modal-field">
      <label>Weight (kg)</label>
      <input type="number" id="input-weight" placeholder="e.g. 72.5" step="0.1"/>
    </div>
    <div class="modal-error" id="err-weight"></div>
    <button class="modal-submit" onclick="submitWeight()">Record</button>
  </div>
</div>

<!-- calorie modal -->
<div class="modal-overlay" id="modal-calorie" onclick="closeOnOverlay(event, 'calorie')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Log Food</div>
    <div class="modal-field">
      <label>Food Name</label>
      <input type="text" id="input-food" placeholder="e.g. chicken breast"/>
    </div>
    <div class="modal-field">
      <label>Quantity (grams)</label>
      <input type="number" id="input-qty" placeholder="e.g. 150" step="1"/>
    </div>
    <div class="modal-error" id="err-calorie"></div>
    <button class="modal-submit" onclick="submitCalorie()">Log Food</button>
  </div>
</div>

<!-- habit modal -->
<div class="modal-overlay" id="modal-habit" onclick="closeOnOverlay(event, 'habit')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Habit</div>
    <div class="modal-field">
      <label>Habit Name</label>
      <input type="text" id="input-habit" placeholder="e.g. Morning Run"/>
    </div>
    <div class="modal-field">
      <label>Description</label>
      <input type="text" id="input-habit-desc" placeholder="e.g. Run 5km every morning"/>
    </div>
    <div class="modal-error" id="err-habit"></div>
    <button class="modal-submit" onclick="submitHabit()">Create Habit</button>
  </div>
</div>

<script>
const API = "https://pulse-log.onrender.com";

// ── auth guard ──
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

const headers = {
  'Content-Type': 'application/json',
  'Authorization': 'Bearer ' + token
};

// ── starfield ──
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({ length: 100 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.1 + 0.2,
  speed: Math.random() * 0.12 + 0.03,
  opacity: Math.random() * 0.3 + 0.08,
  tw: Math.random() * 0.01 + 0.004,
  to: Math.random() * Math.PI * 2,
}));
const pulses = Array.from({ length: 10 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.4 + 0.6,
  speed: Math.random() * 0.18 + 0.05,
  opacity: Math.random() * 0.25 + 0.06,
  tw: Math.random() * 0.015 + 0.005,
  to: Math.random() * Math.PI * 2,
}));

let t = 0;
(function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t++;
  for (const s of stars) {
    s.y -= s.speed;
    if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,160,150,${s.opacity * (0.6 + 0.4 * Math.sin(t * s.tw + s.to))})`;
    ctx.fill();
  }
  for (const p of pulses) {
    p.y -= p.speed;
    if (p.y < -2) { p.y = canvas.height + 2; p.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,0,10,${p.opacity * (0.5 + 0.5 * Math.sin(t * p.tw + p.to))})`;
    ctx.fill();
  }
  requestAnimationFrame(draw);
})();

// ── load all data ──
async function loadAll() {
  try {
    const [meRes, weightRes, calorieRes, bmiRes, habitRes] = await Promise.all([
      fetch(`${API}/me`, { headers }),
      fetch(`${API}/weight`, { headers }),
      fetch(`${API}/calorielog`, { headers }),
      fetch(`${API}/bmi`, { headers }),
      fetch(`${API}/habit`, { headers }),
    ]);

    // if any 401, kick to login
    if (meRes.status === 401) { localStorage.removeItem('token'); window.location.href = 'login.html'; return; }

    const me       = await meRes.json();
    const weights  = await weightRes.json();
    const calories = await calorieRes.json();
    const bmi      = await bmiRes.json();
    const habits   = await habitRes.json();

    renderUser(me);
    renderBMI(bmi);
    renderWeight(weights);
    renderCalories(calories);
    renderHabits(habits);
  } catch (e) {
    console.error('Load error:', e);
  }
}

// ── render user ──
function renderUser(me) {
  document.getElementById('username').textContent = me.username;
}

// ── render bmi ──
function renderBMI(bmi) {
  document.getElementById('bmi-val').textContent = bmi.bmi;
  const cat = document.getElementById('bmi-cat');
  cat.textContent = bmi.category;
  if (bmi.category === 'Normal') cat.style.color = '#22c55e', cat.style.borderColor = '#22c55e';
}

// ── render weight chart ──
function renderWeight(weights) {
  if (!weights.length) {
    document.getElementById('weight-current').innerHTML = '—<span>kg</span>';
    return;
  }

  const sorted = weights.slice().sort((a, b) => new Date(a.logged_at) - new Date(b.logged_at));
  const last = sorted[sorted.length - 1];
  document.getElementById('weight-current').innerHTML = `${last.weight}<span>kg</span>`;

  // delta
  if (sorted.length > 1) {
    const prev = sorted[sorted.length - 2];
    const diff = (last.weight - prev.weight).toFixed(1);
    const el = document.getElementById('weight-delta');
    el.textContent = (diff > 0 ? '+' : '') + diff + ' kg';
    el.className = 'chart-delta ' + (diff > 0 ? 'up' : 'down');
  }

  // draw chart
  const recent = sorted.slice(-7);
  const c = document.getElementById('weightChart');
  const cCtx = c.getContext('2d');
  c.width = c.offsetWidth * window.devicePixelRatio;
  c.height = 100 * window.devicePixelRatio;
  cCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const W = c.offsetWidth, H = 100;
  const vals = recent.map(w => w.weight);
  const min = Math.min(...vals) - 1;
  const max = Math.max(...vals) + 1;
  const xStep = W / (recent.length - 1 || 1);

  const pts = vals.map((v, i) => ({
    x: i * xStep,
    y: H - ((v - min) / (max - min || 1)) * (H - 16) - 8
  }));

  // gradient fill
  const grad = cCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(192,0,10,0.3)');
  grad.addColorStop(1, 'rgba(192,0,10,0)');

  cCtx.beginPath();
  cCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx = (pts[i-1].x + pts[i].x) / 2;
    cCtx.bezierCurveTo(mx, pts[i-1].y, mx, pts[i].y, pts[i].x, pts[i].y);
  }
  cCtx.lineTo(pts[pts.length-1].x, H);
  cCtx.lineTo(pts[0].x, H);
  cCtx.closePath();
  cCtx.fillStyle = grad;
  cCtx.fill();

  // line
  cCtx.beginPath();
  cCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx = (pts[i-1].x + pts[i].x) / 2;
    cCtx.bezierCurveTo(mx, pts[i-1].y, mx, pts[i].y, pts[i].x, pts[i].y);
  }
  cCtx.strokeStyle = '#c0000a';
  cCtx.lineWidth = 2;
  cCtx.stroke();

  // dots
  for (const p of pts) {
    cCtx.beginPath();
    cCtx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    cCtx.fillStyle = '#c0000a';
    cCtx.fill();
    cCtx.beginPath();
    cCtx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    cCtx.fillStyle = '#e8e0d8';
    cCtx.fill();
  }

  // dates
  const datesEl = document.getElementById('chart-dates');
  datesEl.innerHTML = recent.map(w => {
    const d = new Date(w.logged_at);
    return `<span>${d.getDate()}/${d.getMonth()+1}</span>`;
  }).join('');
}

// ── render calories (today only) ──
function renderCalories(all) {
  const today = new Date().toDateString();
  const todayLogs = all.filter(c => new Date(c.logged_at).toDateString() === today);

  const totalKcal = todayLogs.reduce((s, c) => s + c.calories_kcal, 0);
  const totalProtein = todayLogs.reduce((s, c) => s + c.protein_g, 0);
  const totalCarbs = todayLogs.reduce((s, c) => s + c.carb_g, 0);
  const totalFats = todayLogs.reduce((s, c) => s + c.fats_g, 0);

  const GOAL = 2000;
  const pct = Math.min(totalKcal / GOAL, 1);
  const circumference = 289;

  document.getElementById('ring-kcal').textContent = Math.round(totalKcal);
  document.getElementById('ring-progress').style.strokeDashoffset = circumference - (pct * circumference);

  document.getElementById('val-protein').textContent = Math.round(totalProtein) + 'g';
  document.getElementById('val-carbs').textContent = Math.round(totalCarbs) + 'g';
  document.getElementById('val-fats').textContent = Math.round(totalFats) + 'g';

  // macro bars (relative to each other, max = biggest macro)
  const maxMacro = Math.max(totalProtein, totalCarbs, totalFats, 1);
  document.getElementById('bar-protein').style.width = (totalProtein / maxMacro * 100) + '%';
  document.getElementById('bar-carbs').style.width = (totalCarbs / maxMacro * 100) + '%';
  document.getElementById('bar-fats').style.width = (totalFats / maxMacro * 100) + '%';
}

// ── render habits ──
function renderHabits(habits) {
  const el = document.getElementById('habits-list');
  if (!habits.length) {
    el.innerHTML = '<div class="no-data">No habits yet. Create one below.</div>';
    return;
  }

  // show up to 6
  const shown = habits.slice(0, 6);
  el.innerHTML = shown.map(h => `
    <div class="habit-item">
      <span class="habit-icon">◆</span>
      <span class="habit-name">${h.habit}</span>
      <div class="habit-days">
        ${Array.from({length: 7}, (_, i) => `<div class="day-dot"></div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ── modals ──
function openModal(type) {
  document.getElementById('modal-' + type).classList.add('open');
}

function closeModal(type) {
  document.getElementById('modal-' + type).classList.remove('open');
}

function closeOnOverlay(e, type) {
  if (e.target === e.currentTarget) closeModal(type);
}

// ── submit weight ──
async function submitWeight() {
  const val = parseFloat(document.getElementById('input-weight').value);
  const err = document.getElementById('err-weight');
  if (!val || val <= 0) { err.textContent = 'Enter a valid weight.'; err.classList.add('show'); return; }
  err.classList.remove('show');

  try {
    const res = await fetch(`${API}/weight`, {
      method: 'POST', headers,
      body: JSON.stringify({ weight: val })
    });
    if (!res.ok) throw new Error('Failed');
    document.getElementById('input-weight').value = '';
    closeModal('weight');
    loadAll();
  } catch (e) {
    err.textContent = 'Something went wrong.';
    err.classList.add('show');
  }
}

// ── submit calorie ──
async function submitCalorie() {
  const food = document.getElementById('input-food').value.trim();
  const qty = parseFloat(document.getElementById('input-qty').value);
  const err = document.getElementById('err-calorie');

  if (!food || !qty || qty <= 0) { err.textContent = 'Fill in both fields.'; err.classList.add('show'); return; }
  err.classList.remove('show');

  const btn = document.querySelector('#modal-calorie .modal-submit');
  btn.textContent = 'Searching...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  try {
    const res = await fetch(`${API}/calorielog`, {
      method: 'POST', headers,
      body: JSON.stringify({ food_name: food, quantity: qty })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Not found'); }
    document.getElementById('input-food').value = '';
    document.getElementById('input-qty').value = '';
    closeModal('calorie');
    loadAll();
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
  } finally {
    btn.textContent = 'Log Food';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }
}

// ── submit habit ──
async function submitHabit() {
  const habit = document.getElementById('input-habit').value.trim();
  const desc = document.getElementById('input-habit-desc').value.trim();
  const err = document.getElementById('err-habit');

  if (!habit || !desc) { err.textContent = 'Fill in both fields.'; err.classList.add('show'); return; }
  err.classList.remove('show');

  try {
    const res = await fetch(`${API}/habit`, {
      method: 'POST', headers,
      body: JSON.stringify({ habit, description: desc })
    });
    if (!res.ok) throw new Error('Failed');
    document.getElementById('input-habit').value = '';
    document.getElementById('input-habit-desc').value = '';
    closeModal('habit');
    loadAll();
  } catch (e) {
    err.textContent = 'Something went wrong.';
    err.classList.add('show');
  }
}
