<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseLog — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #020202;
    --surface: #0c0c0c;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(180,0,0,0.3);
    --text: #e8e0d8;
    --muted: #5a5550;
    --accent: #c0000a;
    --accent-bright: #e8000d;
    --accent-dim: rgba(180,0,0,0.1);
    --danger: #ef4444;
    --input-bg: #070707;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cinzel', serif;
    -webkit-font-smoothing: antialiased;
  }

  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid rgba(180,0,0,0.2);
    border-radius: 4px;
    padding: 2.5rem 2rem;
    animation: fadeUp 0.5s ease both;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 20px;
    height: 20px;
    stroke: white;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .logo-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .field {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .input-wrap {
    position: relative;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    letter-spacing: 0.03em;
  }

  input::placeholder { color: #2a2520; }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(180,0,0,0.12);
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .toggle-pw:hover { color: var(--text); }

  .toggle-pw svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
  }

  .forgot {
    display: block;
    text-align: right;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    margin-top: 6px;
    transition: color 0.2s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .forgot:hover { color: var(--accent-bright); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #e8e0d8;
    border: none;
    border-radius: 2px;
    padding: 0.85rem;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Cinzel', serif;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .btn-primary:hover { background: var(--accent-bright); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-primary.loading {
    opacity: 0.6;
    pointer-events: none;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .footer-text {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 1.5rem;
  }

  .footer-text a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .footer-text a:hover { color: var(--accent-bright); text-decoration: underline; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 0.6rem 0.875rem;
    margin-top: 1rem;
    display: none;
  }

  .error-msg.show { display: block; }

  /* status bar top for mobile feel */
  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 400px;
    padding: 0 4px;
    margin-bottom: 1rem;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .statusbar-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="page">

  <div class="statusbar">
    <span id="clock">9:41</span>
    <div class="statusbar-right">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="1" y="3" width="10" height="7" rx="1.5"/>
        <path d="M12 5.5h1.5a1 1 0 011 1v1a1 1 0 01-1 1H12"/>
        <rect x="2" y="4.5" width="6" height="4" rx="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </div>
  </div>

  <div class="card">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <span class="logo-name">PulseLog</span>
    </div>

    <h1>Log in</h1>
    <p class="subtitle">Track your health. Own your data.</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="hello@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Toggle password visibility">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="error-msg" id="error-msg">Incorrect email or password. Try again.</div>

    <button class="btn-primary" id="login-btn" type="button">Login</button>

    <div class="divider">or</div>

    <p class="footer-text">
      Don't have an account? <a href="register.html">Sign up</a>
    </p>

  </div>
</div>

<script>
  // --- starfield ---
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const STAR_COUNT = 100;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.1 + 0.2,
    speed: Math.random() * 0.12 + 0.03,
    opacity: Math.random() * 0.35 + 0.1,
    twinkleSpeed: Math.random() * 0.01 + 0.004,
    twinkleOffset: Math.random() * Math.PI * 2,
  }));

  const PULSE_COUNT = 10;
  const pulses = Array.from({ length: PULSE_COUNT }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.8,
    speed: Math.random() * 0.2 + 0.05,
    opacity: Math.random() * 0.3 + 0.08,
    twinkleSpeed: Math.random() * 0.015 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2,
  }));

  let t = 0;
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 1;

    for (const s of stars) {
      s.y -= s.speed;
      if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
      const alpha = s.opacity * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 160, 150, ${alpha})`;
      ctx.fill();
    }

    for (const p of pulses) {
      p.y -= p.speed;
      if (p.y < -2) { p.y = canvas.height + 2; p.x = Math.random() * canvas.width; }
      const alpha = p.opacity * (0.5 + 0.5 * Math.sin(t * p.twinkleSpeed + p.twinkleOffset));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 0, 10, ${alpha})`;
      ctx.fill();
    }

    requestAnimationFrame(drawStars);
  }
  drawStars();
  // --- end starfield ---

  const API = "https://pulse-log.onrender.com";

  // live clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 30000);

  // toggle password visibility
  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('toggle-pw');
  const eyeIcon = document.getElementById('eye-icon');

  toggleBtn.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // login
  const loginBtn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errorMsg.textContent = 'Please enter your email and password.';
      errorMsg.classList.add('show');
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.textContent = 'Logging in…';
    errorMsg.classList.remove('show');

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Login failed');
      }

      localStorage.setItem('token', data.access_token);
      window.location.href = 'index.html';

    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.add('show');
      loginBtn.classList.remove('loading');
      loginBtn.textContent = 'Login';
    }
  });

  // enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });
</script>
</body>
</html>
